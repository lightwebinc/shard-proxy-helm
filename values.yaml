# Default values for shard-proxy.
# Every binary flag is exposed under .config; advanced ones empty/disabled by default.

# HA NOTE: the proxy is the ingress datapath. replicaCount=1 is a single point of
# failure — a pod restart drops ingress until it is rescheduled. The proxy holds no
# shared replicated state, so HA is achieved at the network layer, not by raising
# replicaCount blindly: front replicas with external BGP/ECMP anycast (or a per-pod
# fabric IPv6, see networking below) so traffic fails over. Raising replicaCount
# without anycast just creates N independent ingress points, not a failover pair.
replicaCount: 1

# Pod termination grace. MUST be >= config.drainTimeout, else Kubernetes SIGKILLs the
# proxy mid-drain and downstream listeners see an unrecoverable gap. Empty = cluster
# default (30s). Raise in lockstep with drainTimeout.
terminationGracePeriodSeconds: 30

image:
  repository: ghcr.io/lightwebinc/shard-proxy
  # IfNotPresent is correct for the default immutable tag below. FOOTGUN: if you
  # override tag with a MUTABLE tag (e.g. "latest" / "main"), a rescheduled pod keeps
  # the stale cached image — set pullPolicy: Always whenever you use a mutable tag.
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when empty — appVersion must equal a PUBLISHED
  # ghcr image tag (see the contract note in Chart.yaml), or `tag: ""` fails to pull.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
# Matches the distroless/static:nonroot image (uid 65532). Enforces nonroot even if
# the image is overridden. NET_ADMIN is granted below at the container level, which is
# compatible with running as nonroot.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Multicast egress requires NET_ADMIN to set IPV6_MULTICAST_IF on raw sockets.
securityContext:
  capabilities:
    add: ["NET_ADMIN"]

# Networking mode:
#   multus  — primary CNI for control/metrics + macvlan secondary on fabric NIC (default)
#   host    — hostNetwork: true; single-NIC fallback
#   unicast — primary CNI only; pure unicast egress (proxy unicast mode is not yet implemented;
#             chart emits a warning annotation)
networking:
  mode: multus
  multus:
    networkName: mcast-fabric
    namespace: bsv-mcast
    # Per-pod fabric IPv6 in CIDR form. Must be unique per pod when replicaCount > 1.
    fabricIPv6: ""
    interface: net1
  host:
    dnsPolicy: ClusterFirstWithHostNet

# Application configuration. Mirrors every flag in shard-proxy/config/config.go.
config:
  listenAddr: "[::]"
  udpListenPort: 8725
  tcpListenPort: 0

  # Miner-tier ingress gate. The user ports above (8725 / tcp) are
  # transaction-only: BRC-131 block, BRC-133 coinbase, and BRC-132 subtree
  # data frames are dropped there. Those privileged frames may only enter
  # through the miner ingress below, which you expose to miner-tier peers
  # alone (restrict via networkPolicy.minerIngressFrom / firewall). Leave the
  # miner ports at 0 to ingest transactions only.
  # See bsv-multicast/DESIGN.md#ingress-authorization-miner-tier-gate.
  minerListenPort: 0      # MINER_LISTEN_PORT — UDP miner ingress (privileged frames); 0 = disabled
  minerTcpListenPort: 0   # MINER_TCP_LISTEN_PORT — TCP miner ingress; 0 = disabled
  # txAcceptPrivileged=true reverts the user port to legacy accept-all (single
  # port ingests everything). Default false = user port is transaction-only.
  txAcceptPrivileged: false
  # Comma-separated NIC names for multicast egress. Overridden by networking.multus.interface
  # when networking.mode=multus.
  multicastIf: "eth0"
  # egressMulticastLoop -> EGRESS_MULTICAST_LOOP (sets the IPV6_MULTICAST_LOOP socket
  # option). REQUIRED true on a COLLAPSED node where
  # the proxy and a co-resident listener share the host: the kernel only forwards the
  # proxy's locally-emitted multicast to the listener's iface (and the fabric tunnels)
  # when loop is on. null inherits the binary default (off). egressHoplimit raises the
  # multicast hop limit (default 1 dies on the first mesh/tunnel hop).
  egressMulticastLoop: null
  egressHoplimit: 0
  egressPort: 9001
  shardBits: 2
  mcScope: "site"
  mcGroupId: "0x000B"

  # SSM (RFC 4607). See bsv-multicast/DESIGN.md#source-specific-multicast-ssm.
  # sourceMode: "ssm" (default, first-class; FF3x, PIM-SSM) or "asm" (FF0x; lab/dev fallback).
  # bindSource: required when sourceMode=ssm. MUST be unique per replica
  # (anycast across replicas breaks PIM-SSM RPF). Set to the per-pod
  # IPv6 from your Multus/Whereabouts allocation, e.g.
  #   networking.multus.staticIPs[i] without the /prefix suffix.
  sourceMode: "ssm"
  bindSource: ""
  # 0 means runtime.NumCPU at startup.
  numWorkers: 0
  # BRC-130 path MTU for fragmentation. 0 = disabled.
  fragMtu: 0
  drainTimeout: "0s"

  # BRC-142 origin-side coalescing (bundle frame, FrameVer 0x08). When enabled
  # the proxy packs many small transactions from one ingest batch into bundle
  # datagrams, cutting fabric pps; the listener edge-decoalesces (or a
  # bundle-capable consumer takes the bundle whole). Coalesce at the ORIGIN,
  # never at a spine. Default off preserves per-frame egress.
  # See bsv-multicast/docs/brc-142-coalescing-frame.md.
  coalesce: false            # COALESCE — master switch
  coalesceMaxBytes: 1500     # COALESCE_MAX_BYTES — max bundle datagram size (0 ⇒ 1500, the Ethernet MTU baseline)
  coalesceMaxMembers: 0      # COALESCE_MAX_MEMBERS — max transactions per bundle (0 = MTU-bound)
  coalesceCarryTxid: false   # COALESCE_CARRY_TXID — carry per-member TxID on the wire (dedup/billing) vs recompute

  # Two-tier ingress TxID deduplication.
  # Tier-1: in-process LRU (always active when localCap > 0).
  # Tier-2: modular shard-common/cache backend SETNX (memory|redis|aerospike).
  # Set localCap: 0 to disable ingress dedup entirely.
  # See shard-common/docs/cache-backend.md
  txidDedup:
    localCap: 1048576    # tier-1 LRU capacity; 0 = disable
    backend: ""          # redis|aerospike|memory|none; empty infers redis when redisAddr set, else none
    redisAddr: ""        # Redis/Valkey/Dragonfly addr; empty = local-only (no cluster coordination)
    prefix: "bsp:tx:"   # key prefix — must match listener's ingressSet.prefix
    ttl: "10m"           # tier-2 entry TTL (1m–30m typical)
    # Aerospike Community Edition (required when backend=aerospike). TTL floor 1s.
    aerospikeHosts: ""              # comma-separated host:port
    aerospikeNamespace: "cache"
    aerospikeSet: "bsp"
  debug: false  # deprecated alias for logLevel=debug
  # Unified logging — see shard-common/docs/logging.md
  logFormat: "text"   # text (stderr) | json (stdout, for fleet aggregation)
  logLevel: "info"    # debug|info|warn|error; runtime-togglable via POST /loglevel + SIGHUP
  traceSampling: 0    # 0..1 trace head sampling (0 = off; exports via otlpEndpoint; control-plane only)
  metricsAddr: ":9100"
  # stampSource: stamp the BRC-129 HashKey from the OBSERVED per-consumer source IP
  # (authoritative own-traffic exclusion). Leave null to inherit the binary default
  # (true); set false ONLY when a source-rewriting LB sits in front of the proxy.
  stampSource: null
  instanceId: ""
  otlpEndpoint: ""
  otlpInterval: "30s"

  # BRC-139 auto-shard-config consumer (opt-in). See
  # bsv-multicast/DESIGN.md#automatic-shard-configuration.
  # When enabled the proxy opens a dedicated beacon-receive socket and adopts
  # ShardBits/SourceMode from authoritative pilot manifests once quorum +
  # hysteresis are met. Manual config above always wins; default off.
  autoShardConfig:
    enabled: false          # MANIFEST_CONSUMER_ENABLED — master switch
    bootstrap: "optional"   # MANIFEST_BOOTSTRAP — optional | required (fail-closed: no egress until quorum)
    pilotQuorum: 2          # PILOT_QUORUM — min distinct authoritative announcers
    pilotHysteresis: "0s"   # PILOT_HYSTERESIS — 0 ⇒ 2 × AnnounceInterval
    beaconScope: ""         # MANIFEST_BEACON_SCOPE — empty inherits mcScope
    beaconPort: 9001        # MANIFEST_BEACON_PORT — matches shard-manifest -port
    liveResharding: false   # LIVE_RESHARDING — true = dual-emit bridging; false = restart-on-adopt
    bridgingWindow: "0s"    # BRIDGING_WINDOW — 0 ⇒ honour pilot TransitionEpoch

service:
  type: ClusterIP
  metricsPort: 9100

metrics:
  enabled: true
  path: /metrics
  port: 9100
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    relabelings: []
    metricRelabelings: []

probes:
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# Datapath component (recvmmsg/sendmmsg packet loop).
# CPU-bound under load — these are conservative starting points; tune limits
# upward against your own throughput benchmark before high-rate production use.
# Leaving this empty ({}) yields BestEffort QoS and no admission control.
resources:
  requests:
    cpu: 500m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 512Mi
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
# Optional RuntimeClass for specialised container runtimes. Empty = cluster default.
runtimeClassName: ""
topologySpreadConstraints: []

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: ""

networkPolicy:
  enabled: false
  # ingressFrom is a list of selectors permitted to reach the metrics port.
  # Each entry is a standard networking.k8s.io/v1 NetworkPolicyPeer.
  ingressFrom: []
  # minerIngressFrom restricts who may reach the miner ingress ports
  # (config.minerListenPort / minerTcpListenPort), which accept privileged
  # block/coinbase/subtree-data frames. Empty + miner ports set ⇒ the policy
  # admits no miner peers (fail-closed) so an unset allowlist cannot silently
  # expose the privileged path. NOTE: this governs the default pod network
  # only; on a Multus/host-network multicast fabric the real source
  # restriction is the fabric firewall / provider ACL, not this policy.
  minerIngressFrom: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Extra environment variables (escape hatch for future flags not yet exposed under .config)
extraEnv: []
# - name: FOO
#   value: "bar"
