# Orchestrated edge preset (W2): shard-proxy as a hostNetwork pod on a fleet-
# provisioned k0s worker. The host fabric (ip6gre + mc-router) is configured by the
# integrated-infra roles; the pod binds it directly via the host netns. Pin per
# region with the topology label the k0s-worker role applies, and tolerate the
# data-plane taint so the pod schedules onto the fenced edge nodes.
#
#   helm install shard-proxy-us . -f examples/orchestrated-edge.yaml \
#     --set nodeSelector."topology\.kubernetes\.io/region"=us
networking:
  mode: host
  host:
    dnsPolicy: ClusterFirstWithHostNet

config:
  # NOT :9100 — the Prometheus node-exporter DaemonSet owns hostPort 9100 on every
  # k8s node, and a hostNetwork pod binding 9100 would collide (FailedScheduling /
  # bind conflict). The bind addr (env) and the declared port (below) must agree.
  metricsAddr: ":9110"

# The declared container/host port + Service/scrape port must match metricsAddr.
service:
  metricsPort: 9110
metrics:
  port: 9110

# Collapsed-node multicast egress: loop ON so the kernel forwards the locally-emitted
# multicast to the co-resident listener + fabric tunnels; raised hoplimit for tunnels.
# Raw multicast emit needs NET_RAW in addition to NET_ADMIN.
securityContext:
  capabilities:
    add: [NET_ADMIN, NET_RAW]
  # Authoritatively stamp the BRC-129 HashKey from the observed per-consumer source
  # IP (own-traffic exclusion). true here because the pod sees real source addresses
  # (hostNetwork, no source-rewriting LB in front).
  stampSource: true

# One pod per region; the k0s-worker role labels nodes topology.kubernetes.io/region.
nodeSelector:
  topology.kubernetes.io/region: us

# The k0s-worker role taints edge nodes dataplane=true:NoSchedule.
tolerations:
  - key: dataplane
    operator: Exists
    effect: NoSchedule
