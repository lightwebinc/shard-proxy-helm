name: lint

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      # Defaults are sourceMode=ssm, which the schema (deliberately) fails
      # without a per-replica config.bindSource — so lint/template set one.
      - name: helm lint (defaults + bindSource)
        run: helm lint . --set config.bindSource=2001:db8::21

      - name: helm lint (strict)
        run: helm lint . --strict --set config.bindSource=2001:db8::21

      - name: helm template (multus default)
        run: |
          helm template release-test . \
            --set networking.multus.fabricIPv6=fd20::21/64 \
            --set config.bindSource=fd20::21 \
            --debug > /tmp/render-multus.yaml
          test -s /tmp/render-multus.yaml

      - name: helm template (host network fallback, asm)
        run: |
          helm template release-test . \
            --set networking.mode=host \
            --set config.sourceMode=asm \
            --debug > /tmp/render-host.yaml
          test -s /tmp/render-host.yaml

      - name: helm template (servicemonitor + pdb + networkpolicy + hpa enabled)
        run: |
          helm template release-test . \
            --set networking.mode=host \
            --set config.sourceMode=asm \
            --set metrics.serviceMonitor.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set networkPolicy.enabled=true \
            --set autoscaling.enabled=true \
            --debug > /tmp/render-full.yaml
          test -s /tmp/render-full.yaml

      - name: helm template (examples — catch drift)
        run: |
          for f in examples/*.yaml; do
            echo "::group::$f"
            helm template release-test . -f "$f" --debug > "/tmp/render-$(basename "$f")"
            test -s "/tmp/render-$(basename "$f")"
            echo "::endgroup::"
          done
