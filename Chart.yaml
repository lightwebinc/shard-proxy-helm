apiVersion: v2
name: shard-proxy
description: IPv6 multicast frame proxy for the Bitcoin transaction distribution network
type: application
version: 0.6.0
# appVersion MUST equal a tag published on ghcr.io/lightwebinc/shard-proxy
# (the chart's tag:"" default pulls this). Images are published manually via the
# binary repo's image-publish.yml workflow; bump appVersion ONLY in lockstep with
# an image publish — binary git tags are NOT image tags until published.
# NOTE: chart 0.6.0 renames miner* values → subtree/blockListenPort (git tag
# v1.15.0). Bump appVersion to "1.15.0" once that image is published to GHCR.
appVersion: "1.14.0"
kubeVersion: ">= 1.27.0-0"
keywords:
  - bitcoin
  - bsv
  - multicast
  - brc-124
  - brc-128
home: https://github.com/lightwebinc/shard-proxy
sources:
  - https://github.com/lightwebinc/shard-proxy
  - https://github.com/lightwebinc/shard-proxy-helm
maintainers:
  - name: lightwebinc
    url: https://github.com/lightwebinc
icon: https://raw.githubusercontent.com/lightwebinc/bsv-multicast/main/.assets/icon.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart scaffold
    - kind: added
      description: config.autoShardConfig keys (BRC-139 manifest consumer)
    - kind: added
      description: Collapsed-node keys (config.stampSource, config.egressMulticastLoop, config.egressHoplimit) + collapsed-node example
    - kind: changed
      description: Schema fails install fast when config.sourceMode=ssm and config.bindSource is empty
    - kind: changed
      description: Renamed orchestrated-edge example to collapsed-node; genericized example presets and doc pointers
    - kind: changed
      description: values.schema.json caps config.shardBits at 12 (BRC-129 shard zoning)
    - kind: changed
      description: appVersion 1.14.0 (shard-bits validator 1-12; shard-common v0.14.3)
