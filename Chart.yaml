apiVersion: v2
name: shard-proxy
description: IPv6 multicast frame proxy for the Bitcoin transaction distribution network
type: application
version: 0.3.5
# appVersion MUST equal a tag published on ghcr.io/lightwebinc/shard-proxy
# (the chart's tag:"" default pulls this). Images are published manually via the
# binary repo's image-publish.yml workflow; bump appVersion ONLY in lockstep with
# an image publish — binary git tags are NOT image tags until published.
appVersion: "1.12.16"
kubeVersion: ">= 1.27.0-0"
keywords:
  - bitcoin
  - bsv
  - multicast
  - brc-124
  - brc-128
home: https://github.com/lightwebinc/shard-proxy
sources:
  - https://github.com/lightwebinc/shard-proxy
  - https://github.com/lightwebinc/shard-proxy-helm
maintainers:
  - name: lightwebinc
    url: https://github.com/lightwebinc
icon: https://raw.githubusercontent.com/lightwebinc/bsv-multicast/main/.assets/icon.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: Initial chart scaffold
    - kind: added
      description: config.autoShardConfig keys (BRC-139 manifest consumer)
