{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shard-proxy.fullname" . }}
  labels:
    {{- include "shard-proxy.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "shard-proxy.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: metrics
          protocol: TCP
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- if or (gt (int (.Values.config.minerListenPort | default 0)) 0) (gt (int (.Values.config.minerTcpListenPort | default 0)) 0) }}
    # Privileged miner ingress: admit only the configured miner peers. An
    # empty minerIngressFrom is fail-closed (no `from` peers ⇒ no source
    # matches), so the privileged path is never silently world-open.
    - ports:
        {{- if gt (int (.Values.config.minerListenPort | default 0)) 0 }}
        - port: miner-udp
          protocol: UDP
        {{- end }}
        {{- if gt (int (.Values.config.minerTcpListenPort | default 0)) 0 }}
        - port: miner-tcp
          protocol: TCP
        {{- end }}
      from:
        {{- toYaml .Values.networkPolicy.minerIngressFrom | nindent 8 }}
    {{- end }}
{{- end }}
